<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiariCore | Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="d-flex align-items-center min-vh-100">
    <main class="container py-4 py-md-5">
      <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
          <section class="card border-0 shadow-lg login-card">
            <div class="card-body p-4 p-md-5">
              <div class="text-center mb-4">
                <img
                  src="diaricorelogo.png"
                  alt="DiariCore logo"
                  class="brand-logo mb-3"
                />
                <h1 class="h3 mb-1 fw-semibold">Welcome back</h1>
                <p class="text-secondary mb-0">
                  Continue your reflection journey with DiariCore.
                </p>
              </div>

              <form action="#" method="post">
                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    class="form-control form-control-lg"
                    id="email"
                    placeholder="you@example.com"
                    required
                  />
                </div>

                <div class="mb-3">
                  <div class="d-flex justify-content-between align-items-center">
                    <label for="password" class="form-label mb-0">Password</label>
                    <a href="#" class="small link-secondary">Forgot password?</a>
                  </div>
                  <input
                    type="password"
                    class="form-control form-control-lg"
                    id="password"
                    placeholder="Enter your password"
                    required
                  />
                </div>

                <div class="form-check mb-4">
                  <input
                    class="form-check-input"
                    type="checkbox"
                    value=""
                    id="rememberMe"
                  />
                  <label class="form-check-label text-secondary" for="rememberMe">
                    Keep me signed in
                  </label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100 mb-3">
                  Sign in
                </button>

                <p class="text-center text-secondary mb-0">
                  New to DiariCore?
                  <a href="#" class="text-decoration-none fw-medium">Create account</a>
                </p>
              </form>
            </div>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
